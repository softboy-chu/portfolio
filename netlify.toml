[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.22.2"
  # This is the magic line that forces devDependencies to install
  NPM_FLAGS = "--include=dev" 
  NODE_ENV = "development"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200